<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綵設 Tsaidesign | 專屬黃金尺碼計算機</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #faf6f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(220, 180, 180, 0.3);
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin: 20px;
            border: 1px solid #f2e4e4;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #b55d6c;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }
        h2 {
            font-size: 20px;
            color: #4a4a4a;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #b55d6c;
            box-shadow: 0 0 8px rgba(181, 93, 108, 0.2);
        }
        button {
            width: 100%;
            background-color: #b55d6c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #9c4a58;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #fdf8f8;
            border-radius: 12px;
            border-left: 5px solid #b55d6c;
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title {
            font-weight: bold;
            color: #b55d6c;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .result-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn-list-title {
            font-size: 13px;
            color: #888;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            border-top: 1px dashed #e0d0d0;
            padding-top: 15px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 美化滾動條 */
        .btn-group::-webkit-scrollbar {
            width: 4px;
        }
        .btn-group::-webkit-scrollbar-thumb {
            background-color: #e0d0d0;
            border-radius: 10px;
        }
        .buy-btn {
            display: block;
            width: 100%;
            text-align: center;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
            cursor: pointer;
            border: none;
        }
        /* 款式顏色區分 */
        .color-1 { background-color: #d0011b; } /* 經典蝦皮紅 */
        .color-2 { background-color: #b55d6c; } /* 綵設品牌粉 */
        .color-3 { background-color: #c96f7c; } 
        .color-4 { background-color: #d8818e; }
        .color-5 { background-color: #4a6fa5; } /* 牛仔系 */
        .color-6 { background-color: #3b5a84; }
        
        .buy-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">綵設 Tsaidesign</div>
    <div class="subtitle">視覺瞬減 5 公斤的秘密</div>
    <h2>黃金尺碼 3秒智慧計算機</h2>
    
    <div class="input-group">
        <label for="height">您的身高 (cm)</label>
        <input type="number" id="height" placeholder="例如：160" required>
    </div>
    
    <div class="input-group">
        <label for="weight">您的體重 (kg)</label>
        <input type="number" id="weight" placeholder="例如：60" required>
    </div>
    
    <button onclick="calculateSize()">一鍵分析我的專屬尺碼</button>
    
    <div class="result-box" id="resultBox">
        <div class="result-title" id="sizeResult">推薦您的尺碼：1 號</div>
        <div class="result-desc" id="descResult"></div>
        
        <div class="btn-list-title">🛍️ 點擊下方按鈕直達蝦皮賣場（尺寸已為您鎖定）</div>
        <div class="btn-group">
            <a onclick="openShopee('straight')" class="buy-btn color-1" id="btn_straight">🛒 搶購【清涼小直筒】</a>
            <a onclick="openShopee('cropped')" class="buy-btn color-2" id="btn_cropped">🛒 搶購【清涼七分褲】</a>
            <a onclick="openShopee('pants')" class="buy-btn color-3" id="btn_pants">🛒 搶購【清涼長褲】</a>
            <a onclick="openShopee('vFlare')" class="buy-btn color-4" id="btn_vFlare">🛒 搶購【清涼V喇褲】</a>
            <a onclick="openShopee('denimShorts')" class="buy-btn color-5" id="btn_denimShorts">🛒 搶購【冰動牛仔短褲】</a>
            <a onclick="openShopee('denimStraight')" class="buy-btn color-6" id="btn_denimStraight">🛒 搶購【冰動牛仔直筒褲】</a>
        </div>
    </div>
</div>

<script>
const urls = {
    straight: {
        web: "https://shopee.tw/product/19327631/51962386738",
        app: "shopee://product/19327631/51962386738"
    },
    cropped: {
        web: "https://shopee.tw/product/19327631/6954915921",
        app: "shopee://product/19327631/6954915921"
    },
    pants: {
        web: "https://shopee.tw/product/19327631/2159899696",
        app: "shopee://product/19327631/2159899696"
    },
    vFlare: {
        web: "https://shopee.tw/product/19327631/26004059233",
        app: "shopee://product/19327631/26004059233"
    },
    denimShorts: {
        web: "https://shopee.tw/product/19327631/29007359820",
        app: "shopee://product/19327631/29007359820"
    },
    denimStraight: {
        web: "https://shopee.tw/product/19327631/26256444370",
        app: "shopee://product/19327631/26256444370"
    }
};

function openShopee(type) {
    const target = urls[type];
    if (!target || !target.web) return;

    // 使用標準 HTTPS 連結，避免部分手機或社群 App 內建瀏覽器
    // 在喚起 shopee:// 時卡住。若手機已安裝蝦皮，系統會自行處理開啟 App。
    window.location.assign(target.web);
}

function calculateSize() {
    const height = parseFloat(document.getElementById('height').value);
    const weight = parseFloat(document.getElementById('weight').value);
    
    if (!height || !weight) {
        alert('請輸入完整的身高與體重喔！');
        return;
    }
    
    const resultBox = document.getElementById('resultBox');
    const sizeResult = document.getElementById('sizeResult');
    const descResult = document.getElementById('descResult');
    
    let size = '';
    let desc = '';

    if (weight < 55) {
        size = '1 號 (S-M)';
        desc = '✨ <strong>極致完美修飾！</strong> 我們的神褲擁有 10:18 的超強黃金彈性。1 號褲能完美服貼您的腰腹，高腰收腹不卡肚、不勒肉，穿上身視覺一秒顯瘦，活動超自在！';
    } else if (weight >= 55 && weight < 71) {
        size = '2 號 (L-XL)';
        desc = '✨ <strong>蜜大腿、馬鞍肉一秒神隱！</strong> 2 號具備極致包覆力，雖然彈性極大卻完全不垮，幫您把腹部與大腿贅肉溫柔收緊，拉長腿部線條，久坐不卡襠，怎麼蹲都舒服！';
    } else if (weight >= 71 && weight < 86) {
        size = '3 號 (2XL-3XL)';
        desc = '✨ <strong>全天候零束縛的舒適魔法！</strong> 彈力大升級，針對下半身豐滿身型量身打造。高彈性剪裁完美貼合、不擠壓肉肉，蹲、跑、跳都輕鬆無阻，穿出高挑好比例！';
    } else {
        size = '4 號 (4XL-5XL)';
        desc = '✨ <strong>極限彈力包覆，無壓力顯瘦神褲！</strong> 擁有驚人的拉伸彈性，舒適度滿分！360 度完美修飾身型，穿上去腰腹不緊繃，讓您整天都輕盈有自信，穿出完美比例！';
    }
    
    sizeResult.innerHTML = `推薦您的尺碼：${size}`;
    descResult.innerHTML = desc;
    
    const sizeNum = size.split(' ')[0];
    
    // 動態更新 6 個按鈕上的尺碼標籤
    document.getElementById('btn_straight').innerHTML = `🛒 搶購【清涼小直筒】直達 ${sizeNum} 號`;
    document.getElementById('btn_cropped').innerHTML = `🛒 搶購【清涼七分褲】直達 ${sizeNum} 號`;
    document.getElementById('btn_pants').innerHTML = `🛒 搶購【清涼長褲】直達 ${sizeNum} 號`;
    document.getElementById('btn_vFlare').innerHTML = `🛒 搶購【清涼V喇褲】直達 ${sizeNum} 號`;
    document.getElementById('btn_denimShorts').innerHTML = `🛒 搶購【冰動牛仔短褲】直達 ${sizeNum} 號`;
    document.getElementById('btn_denimStraight').innerHTML = `🛒 搶購【冰動牛仔直筒褲】直達 ${sizeNum} 號`;
    
    resultBox.style.display = 'block';
}
</script>

</body>
</html>
