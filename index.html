<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>綵設 TSAI Design</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #3e3034;
      background: linear-gradient(145deg, #fffaf7, #f2e5e1);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }
    main {
      width: min(680px, 100%);
      padding: 64px 36px;
      text-align: center;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(109, 67, 75, .15);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(83, 49, 56, .12);
    }
    .eyebrow { letter-spacing: .24em; color: #9b6670; }
    h1 { margin: 18px 0 12px; font-size: clamp(38px, 8vw, 68px); }
    p { margin: 0; line-height: 1.8; color: #765b61; }
    .status {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 18px;
      color: #fff;
      background: #7f4d57;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">TSAI DESIGN</div>
    <h1>綵設</h1>
    <p>為妳設計，穿出自在與自信。</p>
    <div class="status">網站連線測試成功</div>
  </main>
</body>
</html>
