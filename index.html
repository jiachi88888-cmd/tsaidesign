<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綵設 Tsaidesign | 智能尺碼計算機</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #faf6f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(220, 180, 180, 0.3);
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin: 20px;
            border: 1px solid #f2e4e4;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #b55d6c;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        h2 {
            font-size: 20px;
            color: #4a4a4a;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input,
        select {
            width: 100%;
            min-height: 50px;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #fff;
            font-size: 18px;
            transition: all 0.3s;
            outline: none;
        }
        input:focus,
        select:focus {
            border-color: #b55d6c;
            box-shadow: 0 0 8px rgba(181, 93, 108, 0.2);
        }
        .measurement-guide {
            margin: -8px 0 22px;
            padding: 12px 14px;
            border-radius: 10px;
            background-color: #fff8f8;
            color: #765b61;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
        }
        button {
            width: 100%;
            background-color: #b55d6c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #9c4a58;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #fdf8f8;
            border-radius: 12px;
            border-left: 5px solid #b55d6c;
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title {
            font-weight: bold;
            color: #b55d6c;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .result-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn-list-title {
            font-size: 13px;
            color: #888;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            border-top: 1px dashed #e0d0d0;
            padding-top: 15px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .product-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 美化滾動條 */
        .btn-group::-webkit-scrollbar {
            width: 4px;
        }
        .btn-group::-webkit-scrollbar-thumb {
            background-color: #e0d0d0;
            border-radius: 10px;
        }
        .buy-btn {
            display: block;
            width: 100%;
            text-align: center;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
            cursor: pointer;
            border: none;
        }
        /* 款式顏色區分 */
        .color-1 { background-color: #d0011b; } /* 經典蝦皮紅 */
        .color-2 { background-color: #b55d6c; } /* 綵設品牌粉 */
        .color-3 { background-color: #c96f7c; } 
        .color-4 { background-color: #d8818e; }
        .color-5 { background-color: #4a6fa5; } /* 牛仔系 */
        .color-6 { background-color: #3b5a84; }
        .hidden { display: none !important; }
        .buy-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">綵設 Tsaidesign</div>
    <h2>智能尺碼計算機</h2>
    <div class="measurement-guide">
        請填寫身體整圈尺寸：腰圍量褲頭穿著位置，臀圍量臀部最豐滿處。皮尺貼身即可，不要拉緊。
    </div>

    <div class="input-group">
        <label for="series">請先選擇商品系列</label>
        <select id="series" onchange="updateSeriesUI()">
            <option value="cooling" selected>清涼神褲系列（4個尺碼）</option>
            <option value="denim">清涼牛仔系列（3個尺碼）</option>
        </select>
    </div>
    
    <div class="input-group">
        <label for="waist" id="waistLabel">您的腰圍（cm）</label>
        <input type="number" id="waist" inputmode="decimal" min="1" step="0.1" placeholder="例如：78" required>
    </div>
    
    <div class="input-group">
        <label for="hip" id="hipLabel">您的臀圍（cm）</label>
        <input type="number" id="hip" inputmode="decimal" min="1" step="0.1" placeholder="例如：98" required>
    </div>

    <div class="input-group" id="fitPreferenceGroup">
        <label for="fitPreference">您喜歡的穿著感</label>
        <select id="fitPreference">
            <option value="fitted" selected>合身顯瘦（推薦）</option>
            <option value="comfort">舒適自在</option>
        </select>
    </div>
    
    <button type="button" onclick="calculateSize()">一鍵分析我的專屬尺碼</button>
    
    <div class="result-box" id="resultBox" aria-live="polite">
        <div class="result-title" id="sizeResult">推薦您的尺碼：1 號</div>
        <div class="result-desc" id="descResult"></div>
        
        <div class="btn-list-title">🛍️ 點擊下方按鈕直達蝦皮賣場，請選擇推薦的號碼</div>
        <div class="btn-group">
            <div id="coolingButtons" class="product-buttons">
            <a onclick="openShopee('straight')" class="buy-btn color-1" id="btn_straight">🛒 搶購【清涼小直筒】</a>
            <a onclick="openShopee('cropped')" class="buy-btn color-2" id="btn_cropped">🛒 搶購【清涼七分褲】</a>
            <a onclick="openShopee('pants')" class="buy-btn color-3" id="btn_pants">🛒 搶購【清涼長褲】</a>
            <a onclick="openShopee('vFlare')" class="buy-btn color-4" id="btn_vFlare">🛒 搶購【清涼V喇褲】</a>
            </div>
            <div id="denimButtons" class="product-buttons hidden">
            <a onclick="openShopee('denimShorts')" class="buy-btn color-5" id="btn_denimShorts">🛒 搶購【冰動牛仔短褲】</a>
            <a onclick="openShopee('denimStraight')" class="buy-btn color-6" id="btn_denimStraight">🛒 搶購【冰動牛仔直筒褲】</a>
            </div>
        </div>
    </div>
</div>

<script>
const urls = {
    straight: {
        web: "https://shopee.tw/product/19327631/51962386738",
        app: "shopee://product/19327631/51962386738"
    },
    cropped: {
        web: "https://shopee.tw/product/19327631/6954915921",
        app: "shopee://product/19327631/6954915921"
    },
    pants: {
        web: "https://shopee.tw/product/19327631/2159899696",
        app: "shopee://product/19327631/2159899696"
    },
    vFlare: {
        web: "https://shopee.tw/product/19327631/26004059233",
        app: "shopee://product/19327631/26004059233"
    },
    denimShorts: {
        web: "https://shopee.tw/product/19327631/29007359820",
        app: "shopee://product/19327631/29007359820"
    },
    denimStraight: {
        web: "https://shopee.tw/product/19327631/26256444370",
        app: "shopee://product/19327631/26256444370"
    }
};

function openShopee(type) {
    const target = urls[type];
    if (!target || !target.web) return;

    // 使用標準 HTTPS 連結，避免部分手機或社群 App 內建瀏覽器
    // 在喚起 shopee:// 時卡住。若手機已安裝蝦皮，系統會自行處理開啟 App。
    window.location.assign(target.web);
}

const seriesConfig = {
    cooling: {
        unit: 'cm',
        hasPreference: true,
        data: [
            { number: 1, waist: [60, 73], hip: [84, 91], flatWaistHalf: 34, flatHipHalf: 45 },
            { number: 2, waist: [71, 84], hip: [92, 103], flatWaistHalf: 37, flatHipHalf: 48 },
            { number: 3, waist: [84, 102], hip: [102, 115], flatWaistHalf: 40, flatHipHalf: 54 },
            { number: 4, waist: [97, 115], hip: [110, Infinity], flatWaistHalf: 44, flatHipHalf: 58 }
        ]
    },
    denim: {
        unit: '吋',
        hasPreference: false,
        data: [
            { number: 1, waist: [23, 28], hip: [34, 38], flatWaistHalf: 13.5, flatHipHalf: 22 },
            { number: 2, waist: [29, 35], hip: [39, 44], flatWaistHalf: 14.5, flatHipHalf: 23 },
            { number: 3, waist: [36, 42], hip: [43, 48], flatWaistHalf: 16, flatHipHalf: 25 }
        ]
    }
};

function fits(size, waist, hip) {
    return waist >= size.waist[0] && waist <= size.waist[1]
        && hip >= size.hip[0] && hip <= size.hip[1];
}

function smallestAccommodatingSize(value, measurement, sizeData) {
    const matching = sizeData.filter(size => {
        const range = size[measurement];
        return value >= range[0] && value <= range[1];
    });

    if (matching.length) return matching[0].number;
    if (value < sizeData[0][measurement][0]) return 1;

    const nextSize = sizeData.find(size => value <= size[measurement][1]);
    return nextSize ? nextSize.number : sizeData[sizeData.length - 1].number;
}

function updateSeriesUI() {
    const series = document.getElementById('series').value;
    const isDenim = series === 'denim';

    document.getElementById('waistLabel').textContent = `您的腰圍（${isDenim ? '吋' : 'cm'}）`;
    document.getElementById('hipLabel').textContent = `您的臀圍（${isDenim ? '吋' : 'cm'}）`;
    document.getElementById('waist').placeholder = isDenim ? '例如：32' : '例如：78';
    document.getElementById('hip').placeholder = isDenim ? '例如：42' : '例如：98';
    document.getElementById('waist').value = '';
    document.getElementById('hip').value = '';
    document.getElementById('fitPreferenceGroup').classList.toggle('hidden', isDenim);
    document.getElementById('coolingButtons').classList.toggle('hidden', isDenim);
    document.getElementById('denimButtons').classList.toggle('hidden', !isDenim);
    document.getElementById('resultBox').style.display = 'none';
}

function calculateSize() {
    const series = document.getElementById('series').value;
    const config = seriesConfig[series];
    const sizeData = config.data;
    const waist = parseFloat(document.getElementById('waist').value);
    const hip = parseFloat(document.getElementById('hip').value);
    const preference = config.hasPreference ? document.getElementById('fitPreference').value : 'fitted';
    
    if (!waist || !hip || waist <= 0 || hip <= 0) {
        alert('請輸入完整的腰圍與臀圍喔！');
        return;
    }
    
    const resultBox = document.getElementById('resultBox');
    const sizeResult = document.getElementById('sizeResult');
    const descResult = document.getElementById('descResult');
    
    const exactMatches = sizeData.filter(size => fits(size, waist, hip));
    const waistSize = smallestAccommodatingSize(waist, 'waist', sizeData);
    const hipSize = smallestAccommodatingSize(hip, 'hip', sizeData);
    let recommendedNumber;
    let desc;

    if (exactMatches.length > 1) {
        const selected = config.hasPreference && preference === 'comfort'
            ? exactMatches[exactMatches.length - 1]
            : exactMatches[0];
        recommendedNumber = selected.number;
        const choices = exactMatches.map(size => `${size.number}號`).join('、');
        const fitText = preference === 'fitted' ? '合身顯瘦' : '舒適自在';
        desc = `✨ 您的腰圍與臀圍同時符合 <strong>${choices}</strong>。依照「${fitText}」偏好，推薦 <strong>${recommendedNumber}號</strong>。`;
    } else if (exactMatches.length === 1) {
        recommendedNumber = exactMatches[0].number;
        desc = series === 'denim'
            ? `✨ 您的腰圍與臀圍都落在 <strong>${recommendedNumber}號</strong> 的適穿範圍，闊腿版型能保留舒適活動空間。`
            : `✨ 您的腰圍與臀圍都落在 <strong>${recommendedNumber}號</strong> 的適穿範圍，能兼顧包覆與活動舒適度。`;
    } else {
        recommendedNumber = Math.max(waistSize, hipSize);

        if (hipSize > waistSize) {
            desc = `✨ 您的臀圍需要較大的尺碼，已優先照顧臀部活動空間，推薦 <strong>${recommendedNumber}號</strong>；腰頭可能稍微寬鬆。`;
        } else if (waistSize > hipSize) {
            desc = `✨ 您的腰圍需要較大的尺碼，已優先照顧腰腹舒適度，推薦 <strong>${recommendedNumber}號</strong>；臀腿可能稍微寬鬆。`;
        } else {
            desc = `✨ 您的腰臀尺寸接近 <strong>${recommendedNumber}號</strong>，建議選擇 ${recommendedNumber}號，穿著會較舒適。`;
        }
    }

    const notices = [];
    if (series === 'denim') {
        if (waist < 23) notices.push('腰圍低於目前1號標準範圍，1號腰頭可能較寬鬆');
        if (hip < 34) notices.push('臀圍低於目前1號標準範圍，1號臀部可能較寬鬆');
        if (waist > 42) notices.push('腰圍超過42吋，已超出目前標準資料範圍，建議購買前先聯繫客服確認');
        if (hip > 48) notices.push('臀圍超過48吋，已超出目前標準資料範圍，建議購買前先聯繫客服確認');
    } else {
        if (waist < 60) notices.push('腰圍低於目前1號標準範圍，1號腰頭可能較寬鬆');
        if (hip < 84) notices.push('臀圍低於目前1號標準範圍，1號臀腿可能較寬鬆');
        if (waist > 115) notices.push('腰圍已超出目前標準資料範圍，建議購買前先聯繫客服確認');
        if (hip > 123) notices.push('臀圍超過123 cm，4號仍具高彈性，但建議購買前先聯繫客服確認');
    }

    if (notices.length) {
        desc += `<br><br>提醒：${notices.join('；')}。`;
    }

    desc += series === 'denim'
        ? '<br><br>兩款皆為闊腿版型，腿部寬鬆度不另外影響尺碼判斷。'
        : '<br><br>四款皆為四面高彈布料，腿部鬆緊差異不另外影響尺碼判斷。';
    
    sizeResult.textContent = `推薦您的尺碼：${recommendedNumber}號`;
    descResult.innerHTML = desc;
    
    if (series === 'denim') {
        document.getElementById('btn_denimShorts').textContent = `🛒 搶購【冰動牛仔短褲】直達 ${recommendedNumber}號`;
        document.getElementById('btn_denimStraight').textContent = `🛒 搶購【冰動牛仔直筒褲】直達 ${recommendedNumber}號`;
    } else {
        document.getElementById('btn_straight').textContent = `🛒 搶購【清涼小直筒】直達 ${recommendedNumber}號`;
        document.getElementById('btn_cropped').textContent = `🛒 搶購【清涼七分褲】直達 ${recommendedNumber}號`;
        document.getElementById('btn_pants').textContent = `🛒 搶購【清涼長褲】直達 ${recommendedNumber}號`;
        document.getElementById('btn_vFlare').textContent = `🛒 搶購【清涼V喇褲】直達 ${recommendedNumber}號`;
    }
    
    resultBox.style.display = 'block';
}
</script>

</body>
</html>
